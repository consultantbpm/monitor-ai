<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" font-family="-apple-system, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="fillGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4ec9b0"/>
      <stop offset="100%" stop-color="#c586c0"/>
    </linearGradient>
    <linearGradient id="sparkFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4ec9b0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4ec9b0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background (VS Code editor bg) -->
  <rect width="1280" height="800" fill="#1e1e1e"/>

  <!-- Activity bar (left) -->
  <rect x="0" y="0" width="48" height="800" fill="#252526"/>
  <!-- 6 activity icons -->
  <g fill="#858585">
    <rect x="14" y="24" width="20" height="20" rx="2"/>
    <rect x="14" y="64" width="20" height="20" rx="2"/>
    <rect x="14" y="104" width="20" height="20" rx="2"/>
    <rect x="14" y="144" width="20" height="20" rx="2"/>
  </g>
  <!-- eye icon highlighted = AI Exposure activity -->
  <rect x="0" y="180" width="3" height="40" fill="#0098ff"/>
  <g transform="translate(24,200)" fill="#fff">
    <path d="M0 0c-6 0-11 4-13 8c2 4 7 8 13 8s11-4 13-8c-2-4-7-8-13-8zm0 13a5 5 0 1 1 0-10a5 5 0 0 1 0 10zm0-2.5a2.5 2.5 0 1 0 0-5a2.5 2.5 0 0 0 0 5z" transform="translate(-12,-8)"/>
  </g>

  <!-- title bar / tabs area -->
  <rect x="48" y="0" width="1232" height="36" fill="#252526"/>
  <text x="68" y="22" fill="#cccccc" font-size="12">AI Code Exposure Dashboard</text>

  <!-- Main content area starts at y=36 -->
  <g transform="translate(72, 60)">

    <!-- Heading -->
    <text x="0" y="18" fill="#cccccc" font-size="18" font-weight="600">AI Code Exposure Dashboard</text>

    <!-- Big percentage -->
    <text x="0" y="86" fill="#e8e8e8" font-size="56" font-weight="700" font-family="'Segoe UI', system-ui">37.4%</text>

    <!-- Progress bar -->
    <rect x="0" y="106" width="700" height="18" rx="9" fill="#3c3c3c"/>
    <rect x="0" y="106" width="261.8" height="18" rx="9" fill="url(#fillGrad)"/>
    <!-- peak mark at 62% -->
    <rect x="434" y="104" width="2" height="22" fill="#cccccc" opacity="0.6"/>

    <text x="0" y="146" fill="#aaaaaa" font-size="13">Peak 62.0% — 4h ago. Peak exposed lines 14,832 — 4h ago.</text>

    <!-- Stats grid -->
    <g transform="translate(0, 168)" font-size="13" fill="#cccccc">
      <text x="0"   y="0">Project</text>     <text x="180" y="0" fill="#e8e8e8">monitor-ai — c:\AN\ai-code-exposure-monitor</text>
      <text x="0"   y="22">Exposed lines</text> <text x="180" y="22" fill="#e8e8e8" font-weight="600">8,941</text>
      <text x="0"   y="44">Total lines</text>   <text x="180" y="44" fill="#e8e8e8" font-weight="600">23,907</text>
      <text x="0"   y="66">Exposed files</text> <text x="180" y="66" fill="#e8e8e8" font-weight="600">47</text>
      <text x="0"   y="88">Total files</text>   <text x="180" y="88" fill="#e8e8e8" font-weight="600">182</text>
      <text x="0"   y="110">Peak %</text>       <text x="180" y="110" fill="#e8e8e8" font-weight="600">62.0%</text>
      <text x="0"   y="132">Peak exposed lines</text><text x="180" y="132" fill="#e8e8e8" font-weight="600">14,832</text>
    </g>

    <!-- Buttons -->
    <g transform="translate(0, 322)">
      <rect x="0" y="0" width="156" height="28" rx="2" fill="#0e639c"/>
      <text x="78" y="19" fill="#fff" font-size="13" text-anchor="middle">Rescan workspace</text>
      <rect x="166" y="0" width="120" height="28" rx="2" fill="#3a3d41"/>
      <text x="226" y="19" fill="#fff" font-size="13" text-anchor="middle">Reset session</text>
      <rect x="296" y="0" width="130" height="28" rx="2" fill="#3a3d41"/>
      <text x="361" y="19" fill="#fff" font-size="13" text-anchor="middle">Reset all peaks</text>
    </g>

    <!-- Live monitor card -->
    <g transform="translate(0, 376)">
      <rect x="0" y="0" width="1136" height="280" rx="6" fill="#252526" stroke="#3c3c3c"/>
      <!-- Header -->
      <g transform="translate(16, 22)">
        <text x="0" y="0" fill="#858585" font-size="11">▾</text>
        <!-- Heartbeat dot -->
        <circle cx="22" cy="-4" r="5" fill="#4ec9b0"/>
        <circle cx="22" cy="-4" r="9" fill="none" stroke="#4ec9b0" stroke-opacity="0.35" stroke-width="1"/>
        <text x="38" y="0" fill="#a0a0a0" font-size="11" letter-spacing="1.4">LIVE MONITOR</text>
        <text x="1100" y="0" fill="#888" font-size="11" text-anchor="end">2s ago</text>
      </g>

      <!-- Sparkline -->
      <g transform="translate(16, 50)">
        <rect x="0" y="0" width="780" height="160" rx="4" fill="#1e1e1e"/>
        <!-- Live sparkline path -->
        <path fill="url(#sparkFill)" d="M0,140 L20,135 L40,130 L60,125 L80,118 L100,120 L120,115 L140,108 L160,105 L180,98 L200,92 L220,85 L240,82 L260,78 L280,72 L300,68 L320,65 L340,62 L360,58 L380,54 L400,50 L420,48 L440,46 L460,42 L480,40 L500,38 L520,36 L540,34 L560,32 L580,30 L600,28 L620,28 L640,30 L660,32 L680,31 L700,29 L720,28 L740,27 L760,26 L780,26 L780,160 L0,160 Z"/>
        <path fill="none" stroke="#4ec9b0" stroke-width="1.6" d="M0,140 L20,135 L40,130 L60,125 L80,118 L100,120 L120,115 L140,108 L160,105 L180,98 L200,92 L220,85 L240,82 L260,78 L280,72 L300,68 L320,65 L340,62 L360,58 L380,54 L400,50 L420,48 L440,46 L460,42 L480,40 L500,38 L520,36 L540,34 L560,32 L580,30 L600,28 L620,28 L640,30 L660,32 L680,31 L700,29 L720,28 L740,27 L760,26 L780,26"/>
        <text x="0" y="178" fill="#888" font-size="10">% AI exposure · last 60s (1 sample/s)</text>
        <text x="780" y="178" fill="#888" font-size="10" text-anchor="end">min 21.8% · max 37.4%</text>
      </g>

      <!-- Activity feed -->
      <g transform="translate(820, 50)" font-size="12.5" fill="#cccccc">
        <text x="0" y="0" fill="#a0a0a0" font-size="10" letter-spacing="1.2">ACTIVITY FEED</text>

        <g transform="translate(0, 18)">
          <text x="0" y="0" fill="#4ec9b0">●</text>
          <text x="14" y="0">src/exposureTracker.ts</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">264 L · 2s ago</text>
        </g>
        <g transform="translate(0, 38)">
          <text x="0" y="0" fill="#569cd6">✎</text>
          <text x="14" y="0">src/dashboard.ts</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">+12 L · 15s ago</text>
        </g>
        <g transform="translate(0, 58)">
          <text x="0" y="0" fill="#4ec9b0">●</text>
          <text x="14" y="0">src/currentProjectView.ts</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">218 L · 31s ago</text>
        </g>
        <g transform="translate(0, 78)">
          <text x="0" y="0" fill="#c586c0">+</text>
          <text x="14" y="0">media/screenshot-dashboard.svg</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">156 L · 1m ago</text>
        </g>
        <g transform="translate(0, 98)">
          <text x="0" y="0" fill="#569cd6">✎</text>
          <text x="14" y="0">README.md</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">+8 L · 2m ago</text>
        </g>
        <g transform="translate(0, 118)">
          <text x="0" y="0" fill="#4ec9b0">●</text>
          <text x="14" y="0">package.json</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">98 L · 3m ago</text>
        </g>
        <g transform="translate(0, 138)">
          <text x="0" y="0" fill="#d7ba7d">↻</text>
          <text x="14" y="0">workspace rescanned</text>
          <text x="300" y="0" fill="#7a7a7a" text-anchor="end">23,907 L · 5m ago</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Status bar (bottom) -->
  <rect x="0" y="778" width="1280" height="22" fill="#007acc"/>
  <text x="12" y="794" fill="#fff" font-size="12">⎇ main</text>
  <text x="80" y="794" fill="#fff" font-size="12">⨀ 0 ⚠ 0</text>
  <!-- AI Exposure indicator highlighted -->
  <rect x="1080" y="778" width="200" height="22" fill="#005a9e"/>
  <text x="1094" y="794" fill="#fff" font-size="12">👁 AI exposure: 37.4%</text>
</svg>
